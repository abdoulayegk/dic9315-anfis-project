sonar.projectKey=Hayou-Azizkd_dic9315-anfis-project
sonar.organization=hayou-azizkd


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=hello-anfis
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=src

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Exclude test files and unnecessary directories from analysis
sonar.exclusions=tests/**,**/__pycache__/**,*.egg-info/**,htmlcov/**,.github/**

# Python coverage reports
# Accept multiple layouts to avoid CI artifact extraction differences.
sonar.python.coverage.reportPaths=reports/coverage.xml,coverage.xml,**/coverage.xml

# Code coverage requirements
sonar.coverage.exclusions=tests/**
sonar.projectBaseDir=.

# Quality gates (minimum thresholds)
sonar.qualitygate.wait=true