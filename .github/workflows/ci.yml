name: Build-Test-Docs
on:
  push:
    branches:
      - main
      - develop
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  lint-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (project + dev extras)
        run: uv sync --extra dev

      - name: Run Ruff (linting)
        run: uv run ruff check src
        continue-on-error: false

      - name: Check Ruff formatting
        run: uv run ruff format --check src
        continue-on-error: false

      - name: Run MyPy (type checking)
        run: uv run mypy src --ignore-missing-imports
        # Allow type errors for now - good for learning projects
        continue-on-error: true

      - name: Run Bandit (security check)
        run: uv run bandit -r src -c pyproject.toml
        continue-on-error: false

      - name: Check for known vulnerabilities
        run: uv audit
        # Allow vulnerability warnings for learning - can be strict later
        continue-on-error: true

  run-tests:
    name: Run Tests (uv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Run tests with pytest
        run: uv run pytest
        continue-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  mutation-tests:
    name: Mutation Testing (Optional - Docker CPU)
    runs-on: ubuntu-latest
    needs: [lint-and-security, run-tests]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build optimized CI image for mutation testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          load: true
          tags: anfis-mutant:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run mutation testing in Docker container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -v ${{ github.workspace }}/.mutmut-cache:/.mutmut-cache \
            anfis-mutant:test \
            bash -c "pip install --no-cache-dir mutmut && mutmut run --paths-to-mutate src/data_preprocessing.py --tests-dir tests/unit || true && mutmut run --paths-to-mutate src/feature_selection.py --tests-dir tests/unit || true && mutmut results || true"

      - name: Upload mutation cache
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutmut-cache
          path: .mutmut-cache/

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [lint-and-security, run-tests]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better relevancy
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build-docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest
    needs: [lint-and-security, run-tests]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (uv)
        run: uv sync --frozen --extra dev

      - name: Build documentation with Sphinx
        run: uv run make -C docs html

      - name: Publish documentation to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build/html
          force_orphan: true

  publish-package:
    name: Publish Python Package
    runs-on: ubuntu-latest
    needs: [lint-and-security, run-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build package
        run: uv build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

  publish-container:
    name: Publish Lightweight CPU Container Image
    runs-on: ubuntu-latest
    needs: [lint-and-security, run-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/hotfix/'))
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push lightweight CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
