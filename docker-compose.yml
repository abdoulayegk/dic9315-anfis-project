services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: unless-stopped
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_HOSTNAME=anfis-project
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_TIMEOUT=30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data
    ports:
      - "8880:8080"
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - observability

  anfis:
    container_name: anfis
    image: anfis:latest
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.ci
    environment:
      - LOG_LEVEL=INFO
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=anfis-credit-risk
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8808:8888"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - observability

  mlflow:
    container_name: mlflow
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: anfis-mlflow:latest
    restart: unless-stopped
    ports:
      # Host port 5001 because macOS AirPlay Receiver occupies 5000 by default.
      # Container-internal stays 5000 so `http://mlflow:5000` keeps working.
      - "5001:5000"
    volumes:
      - mlruns:/mlflow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - observability

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - observability

volumes:
  dozzle_data:
  mlruns:

networks:
  observability:
    driver: bridge
