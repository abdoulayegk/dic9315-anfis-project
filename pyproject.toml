version = "0.1.0"
description = "Automatisation du projet Anfis"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cloudpickle==3.1.2",
    "contourpy==1.3.3",
    "coverage==7.13.4",
    "cuda-bindings==12.9.4 ; sys_platform != 'darwin'",
    "cuda-pathfinder==1.4.2 ; sys_platform != 'darwin'",
    "cycler==0.12.1",
    "et-xmlfile==2.0.0",
    "filelock==3.25.2",
    "fonttools==4.62.1",
    "fsspec==2026.2.0",
    "imbalanced-learn==0.14.1",
    "iniconfig==2.3.0",
    "jinja2==3.1.6",
    "joblib==1.5.3",
    "kiwisolver==1.5.0",
    "llvmlite==0.46.0 ; platform_machine != 'x86_64' or sys_platform != 'darwin'",
    "llvmlite>=0.45.0,<0.46 ; platform_machine == 'x86_64' and sys_platform == 'darwin'",
    "markupsafe==3.0.3",
    "matplotlib==3.10.8",
    "mpmath==1.3.0",
    "networkx==3.6.1",
    "numba==0.64.0 ; platform_machine != 'x86_64' or sys_platform != 'darwin'",
    "numba>=0.62.0,<0.63 ; platform_machine == 'x86_64' and sys_platform == 'darwin'",
    "numpy==2.4.3 ; platform_machine != 'x86_64' or sys_platform != 'darwin'",
    "numpy>=2.0,<2.4 ; platform_machine == 'x86_64' and sys_platform == 'darwin'",
    "nvidia-cublas-cu12==12.8.4.1 ; sys_platform != 'darwin'",
    "nvidia-cuda-cupti-cu12==12.8.90 ; sys_platform != 'darwin'",
    "nvidia-cuda-nvrtc-cu12==12.8.93 ; sys_platform != 'darwin'",
    "nvidia-cuda-runtime-cu12==12.8.90 ; sys_platform != 'darwin'",
    "nvidia-cudnn-cu12==9.10.2.21 ; sys_platform != 'darwin'",
    "nvidia-cufft-cu12==11.3.3.83 ; sys_platform != 'darwin'",
    "nvidia-cufile-cu12==1.13.1.3 ; sys_platform != 'darwin'",
    "nvidia-curand-cu12==10.3.9.90 ; sys_platform != 'darwin'",
    "nvidia-cusolver-cu12==11.7.3.90 ; sys_platform != 'darwin'",
    "nvidia-cusparse-cu12==12.5.8.93 ; sys_platform != 'darwin'",
    "nvidia-cusparselt-cu12==0.7.1 ; sys_platform != 'darwin'",
    "nvidia-nccl-cu12==2.27.5 ; sys_platform != 'darwin'",
    "nvidia-nvjitlink-cu12==12.8.93 ; sys_platform != 'darwin'",
    "nvidia-nvshmem-cu12==3.4.5 ; sys_platform != 'darwin'",
    "nvidia-nvtx-cu12==12.8.90 ; sys_platform != 'darwin'",
    "openpyxl==3.1.5",
    "packaging==26.0",
    "pandas==3.0.1",
    "pillow==12.1.1",
    "pluggy==1.6.0",
    "pygments==2.19.2",
    "pyparsing==3.3.2",
    "pytest==9.0.2",
    "pytest-cov==7.0.0",
    "pytest-html>=4.1.1",
    "python-dateutil==2.9.0.post0",
    "scikit-fuzzy==0.5.0",
    "scikit-learn==1.8.0",
    "scipy==1.17.1",
    "seaborn==0.13.2",
    "setuptools==82.0.1",
    "shap==0.51.0",
    "six==1.17.0",
    "sklearn-compat==0.1.5",
    "slicer==0.0.8",
    "sympy==1.14.0",
    "threadpoolctl==3.6.0",
    "torch==2.10.0",
    "tqdm==4.67.3",
    "triton==3.6.0 ; sys_platform != 'darwin'",
    "typing-extensions==4.15.0",
    "xlrd==2.0.2",
