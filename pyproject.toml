# Development dependencies for code quality tools
[project.optional-dependencies]
dev = [
    "ruff>=0.8.0",        # Fast Python linter and formatter (replaces black)
    "mypy>=1.13.0",       # Static type checking
    "pre-commit>=3.0.0",  # Git hooks for automated checks
    "bandit[toml]>=1.7.0", # Security linter for Python
    "pip-audit>=2.0.0",   # Check for known vulnerabilities in dependencies
    "mutmut>=2.5.1",      # Mutation testing
]

# Ruff configuration - modern Python linter and formatter (replaces black + flake8)
[tool.ruff]
target-version = "py312"
line-length = 88  # Standard Python formatting width
src = ["src", "tests"]
exclude = [
    ".git",
    "__pycache__", 
    "docs",
    "build",
    "*.egg-info",
    ".venv",
]

[tool.ruff.lint]
# Select rules we want to enforce
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort imports
    "N",   # naming conventions
    "W",   # pycodestyle warnings
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
# Ignore some rules that might be too strict for learning / ML conventions
ignore = [
    "E501",  # Line too long (handled by ruff format)
    "N803",  # Argument name should be lowercase (allow X, y for ML)
    "N806",  # Variable name should be lowercase (allow X_train for ML)
]

# Notebooks: allow imports after comments/setup in same cell
[tool.ruff.lint.per-file-ignores]
"credit_risk_analysis.ipynb" = ["E402"]

# Ruff formatting configuration (replaces Black)
[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

# MyPy configuration - type checking
[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
show_error_codes = true
strict_optional = true
# Be lenient with missing imports for third-party packages
ignore_missing_imports = true

# Pytest: run only tests in tests/ (exclude src/test_*.py scripts that need dataset)
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-q",
    "--strict-markers",
    "--cov=src",
    "--cov-report=term-missing",
    "--cov-report=xml:reports/coverage.xml",
    "--cov-report=html:reports/coverage_html",
    "--junitxml=reports/junit.xml",
    "--html=reports/pytest_report.html",
    "--self-contained-html",
    "--cov-fail-under=52",
]

[tool.coverage.run]
branch = true
source = ["src"]

[tool.coverage.report]
show_missing = true
skip_covered = false

# Bandit configuration - security linting
[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]
# Skip some checks that might be too restrictive for learning projects
skips = ["B101"]  # Skip assert_used - allows assert in tests
