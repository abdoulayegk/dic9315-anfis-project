services:
  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8880:8080"
    networks:
      - observability

  anfis:
    container_name: anfis
    image: anfis:latest
    restart: unless-stopped
    environment:
      - LOG_LEVEL=INFO
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_EXPERIMENT_NAME=anfis-credit-risk-staging
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "8808:8888"
    networks:
      - observability

  mlflow:
    container_name: mlflow
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: anfis-mlflow:latest
    restart: unless-stopped
    ports:
      - "5001:5000"
    volumes:
      - mlruns:/mlflow
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').status==200 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - observability

  cadvisor:
    container_name: cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --docker_only=true
    networks:
      - observability

volumes:
  mlruns:

networks:
  observability:
    driver: bridge
